<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Fatahshaheen OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#118B50', dark: '#0a0a0a' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-dark text-white flex-shrink-0 hidden md:flex flex-col">
            <div class="p-6 text-2xl font-bold border-b border-gray-800 text-primary">FS OS</div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="dashboard.html" class="block p-3 rounded bg-primary text-white">Dashboard</a>
                <a href="products.html" class="block p-3 rounded hover:bg-gray-800">Products</a>
                <a href="apps.html" class="block p-3 rounded hover:bg-gray-800">App Store</a>
                <a href="code-editor.html" class="block p-3 rounded hover:bg-gray-800">Advanced Editor</a>
                <a href="settings.html" class="block p-3 rounded hover:bg-gray-800">Settings</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-8">
            <header class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold">My Stores</h1>
                <button class="bg-primary text-white px-6 py-2 rounded-lg font-medium">+ Create Store</button>
            </header>

            <!-- Store Grid -->
            <div id="store-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Example Store Card -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <div class="h-32 bg-gray-100 rounded-lg mb-4 flex items-center justify-center">
                        <span class="text-gray-400">Store Preview</span>
                    </div>
                    <h3 class="text-xl font-bold mb-2">Shaheen Fashion</h3>
                    <p class="text-gray-500 text-sm mb-4">Status: <span class="text-green-500">Live</span></p>
                    <div class="flex gap-2">
                        <a href="edit-store.html?id=store_001" class="flex-1 text-center bg-primary text-white py-2 rounded hover:opacity-90">Edit Visuals</a>
                        <a href="code-editor.html?id=store_001" class="px-4 py-2 border border-gray-300 rounded hover:bg-gray-50">Code</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="js/index.js"></script>
</body>
</html>
