<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fatah Shaheen OS | Admin Hub</title>
  
  <link rel="icon" type="image/png" href="icon.png" />
  
  <!-- Tailwind CSS & Alpine.js -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { brand: { 50: '#e3f6ea', 100: '#c9ebd5', 500: '#118B50', 600: '#0d7040', 900: '#063922' } },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    /* Glassmorphism utility */
    .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
    .dark .glass { background: rgba(17, 24, 39, 0.7); border-color: rgba(255,255,255,0.05); }
    /* Smooth Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>

<body x-data="{ sidebarOpen: true, darkMode: false }" :class="darkMode ? 'dark bg-gray-950' : 'bg-slate-50'" class="text-gray-800 dark:text-gray-200 h-screen flex overflow-hidden transition-colors duration-300">

  <!-- SIDEBAR (Bento-style floating) -->
  <aside :class="sidebarOpen ? 'translate-x-0 w-64' : '-translate-x-full w-0'" class="fixed lg:static inset-y-0 left-0 z-50 flex flex-col p-4 transition-all duration-300 ease-in-out">
    <div class="glass flex-1 rounded-3xl shadow-xl flex flex-col overflow-hidden">
      <!-- Logo -->
      <div class="p-6 flex items-center gap-3 border-b border-gray-100 dark:border-gray-800">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-brand-600 shadow-lg shadow-brand-500/30 flex items-center justify-center text-white font-bold text-xl">
          F
        </div>
        <div>
          <h2 class="font-extrabold text-gray-900 dark:text-white tracking-tight leading-none">FSCommerce</h2>
          <span class="text-[10px] text-brand-500 font-bold uppercase tracking-widest">OS Panel</span>
        </div>
      </div>

      <!-- Nav Links -->
      <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl bg-brand-50 text-brand-600 dark:bg-brand-500/10 dark:text-brand-400 font-semibold transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          Dashboard
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-gray-500 hover:bg-gray-100 hover:text-gray-900 dark:hover:bg-gray-800 dark:hover:text-white font-medium transition-all group">
          <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          Products
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-gray-500 hover:bg-gray-100 hover:text-gray-900 dark:hover:bg-gray-800 dark:hover:text-white font-medium transition-all group">
          <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          Orders
        </a>
      </nav>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="flex-1 flex flex-col h-screen overflow-hidden">
    
    <!-- HEADER (Floating) -->
    <header class="p-4 lg:pr-8 lg:pl-0 z-40">
      <div class="glass h-16 rounded-2xl px-6 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-4">
          <button @click="sidebarOpen = !sidebarOpen" class="text-gray-500 hover:text-brand-500 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <h1 class="text-xl font-bold text-gray-800 dark:text-white">Command Center</h1>
        </div>
        
        <div class="flex items-center gap-4">
          <!-- Live Visitors Pulse -->
          <div class="flex items-center gap-2 bg-white dark:bg-gray-900 px-3 py-1.5 rounded-full border border-gray-200 dark:border-gray-700 shadow-sm">
            <span class="relative flex h-2.5 w-2.5">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-brand-500"></span>
            </span>
            <span class="text-xs font-bold text-gray-700 dark:text-gray-300"><span class="text-brand-600 dark:text-brand-400">14</span> Live</span>
          </div>

          <!-- Dark Mode Toggle -->
          <button @click="darkMode = !darkMode" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-500 hover:text-brand-500 transition-colors">
            <svg x-show="!darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
            <svg x-show="darkMode" x-cloak class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- WORKSPACE (Scrollable) -->
    <main class="flex-1 overflow-y-auto p-4 lg:pr-8 lg:pl-0 pb-8 space-y-6">
      
      <!-- HERO METRICS (Bento Layout) -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        
        <!-- Card 1 -->
        <div class="bg-white dark:bg-gray-900 rounded-3xl p-6 shadow-sm border border-gray-100 dark:border-gray-800 hover:-translate-y-1 hover:shadow-xl hover:shadow-brand-500/10 transition-all duration-300">
          <div class="flex justify-between items-start mb-4">
            <div class="w-12 h-12 rounded-2xl bg-brand-50 text-brand-600 flex items-center justify-center dark:bg-brand-500/10 dark:text-brand-400">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <span class="px-2 py-1 bg-green-100 text-green-700 rounded-lg text-xs font-bold">+12.5%</span>
          </div>
          <p class="text-gray-500 dark:text-gray-400 text-sm font-medium">Total Revenue</p>
          <h3 class="text-3xl font-extrabold text-gray-900 dark:text-white mt-1">Rs 84,500</h3>
        </div>

        <!-- Card 2 -->
        <div class="bg-white dark:bg-gray-900 rounded-3xl p-6 shadow-sm border border-gray-100 dark:border-gray-800 hover:-translate-y-1 hover:shadow-xl hover:shadow-blue-500/10 transition-all duration-300">
          <div class="flex justify-between items-start mb-4">
            <div class="w-12 h-12 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center dark:bg-blue-500/10 dark:text-blue-400">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            </div>
          </div>
          <p class="text-gray-500 dark:text-gray-400 text-sm font-medium">Active Orders</p>
          <h3 class="text-3xl font-extrabold text-gray-900 dark:text-white mt-1">1,204</h3>
        </div>

        <!-- Card 3 & 4 Omitted for brevity to save token limit, but the layout handles them perfectly! -->

      </div>

      <!-- DATA TABLE AREA -->
      <div class="bg-white dark:bg-gray-900 rounded-3xl border border-gray-100 dark:border-gray-800 shadow-sm overflow-hidden animate-fade-in-up">
        <div class="p-6 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center">
          <h3 class="text-lg font-extrabold text-gray-900 dark:text-white">Recent Transactions</h3>
          <button class="text-brand-500 font-semibold text-sm hover:text-brand-600 transition-colors">View All</button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-gray-50/50 dark:bg-gray-900/50">
              <tr class="text-xs text-gray-400 uppercase tracking-widest font-semibold">
                <th class="px-6 py-4">Order ID</th>
                <th class="px-6 py-4">Customer</th>
                <th class="px-6 py-4">Amount</th>
                <th class="px-6 py-4">Status</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-50 dark:divide-gray-800/50">
              <tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors group">
                <td class="px-6 py-4 font-mono font-medium text-gray-900 dark:text-white">#FS-9842</td>
                <td class="px-6 py-4 text-gray-600 dark:text-gray-300 font-medium">Mohsin Ilyas</td>
                <td class="px-6 py-4 font-bold text-gray-900 dark:text-white">Rs 4,500</td>
                <td class="px-6 py-4">
                  <span class="px-3 py-1 bg-yellow-100 text-yellow-700 dark:bg-yellow-500/20 dark:text-yellow-400 rounded-full text-xs font-bold border border-yellow-200 dark:border-yellow-500/30">Pending</span>
                </td>
              </tr>
              <tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors group">
                <td class="px-6 py-4 font-mono font-medium text-gray-900 dark:text-white">#FS-9841</td>
                <td class="px-6 py-4 text-gray-600 dark:text-gray-300 font-medium">Ali Raza</td>
                <td class="px-6 py-4 font-bold text-gray-900 dark:text-white">Rs 12,000</td>
                <td class="px-6 py-4">
                  <span class="px-3 py-1 bg-green-100 text-green-700 dark:bg-green-500/20 dark:text-green-400 rounded-full text-xs font-bold border border-green-200 dark:border-green-500/30">Delivered</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</body>
</html>
