<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Editor | Fatahshaheen OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#118B50',
                        editor_bg: '#1E1E1E',
                        sidebar_bg: '#252526',
                        border: '#333333'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1E1E1E; }
        .file-tree-item:hover { background-color: #2A2D2E; }
        .file-tree-item.active { background-color: #37373D; color: white; border-left: 2px solid #118B50; }
        #monaco-container { width: 100%; height: calc(100vh - 64px); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-300">

    <!-- Editor Header -->
    <header class="h-16 bg-[#2D2D2D] border-b border-border flex items-center justify-between px-4 z-50">
        <div class="flex items-center gap-6">
            <a href="/dashboard" class="flex items-center gap-2 text-gray-400 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                <span class="text-sm font-medium">Exit Editor</span>
            </a>
            <div class="h-6 w-[1px] bg-border"></div>
            <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-orange-400" fill="currentColor" viewBox="0 0 20 20"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1a1 1 0 112 0v1a1 1 0 11-2 0zM13.536 14.243a1 1 0 011.414 1.414l-.707.707a1 1 0 11-1.414-1.414l.707-.707zM16.243 5.05a1 1 0 011.414 1.414l-.707.707a1 1 0 01-1.414-1.414l.707-.707z"></path></svg>
                <span class="text-sm font-mono text-gray-100">templates/header.html</span>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <span class="text-[10px] text-gray-500 font-mono mr-4">UTF-8 | HTML</span>
            <button onclick="saveCode()" class="px-6 py-1.5 bg-primary text-white text-sm font-bold rounded hover:opacity-90 transition flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                Save 
            </button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        
        <!-- File Explorer Sidebar -->
        <aside class="w-60 bg-sidebar_bg border-r border-border flex flex-col">
            <div class="p-3 text-[11px] uppercase font-bold tracking-widest text-gray-500">Explorer</div>
            <div class="flex-1 overflow-y-auto">
                <!-- Folder: Templates -->
                <div class="px-2 py-1">
                    <div class="flex items-center gap-2 p-1 text-xs text-gray-400">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
                        templates
                    </div>
                    <div class="ml-4 space-y-0.5">
                        <div class="file-tree-item active flex items-center gap-2 p-1.5 rounded text-xs cursor-pointer">
                            <svg class="w-4 h-4 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                            header.html
                        </div>
                        <div class="file-tree-item flex items-center gap-2 p-1.5 rounded text-xs cursor-pointer">
                            <svg class="w-4 h-4 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                            footer.html
                        </td>
                    </div>
                </div>

                <!-- Folder: Assets -->
                <div class="px-2 py-1">
                    <div class="flex items-center gap-2 p-1 text-xs text-gray-400">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
                        assets
                    </div>
                    <div class="ml-4 space-y-0.5">
                        <div class="file-tree-item flex items-center gap-2 p-1.5 rounded text-xs cursor-pointer">
                            <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                            theme.css
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Monaco Editor Container -->
        <main class="flex-1 relative">
            <div id="monaco-container"></div>
        </main>

    </div>

    <script>
        // Initialize Monaco Editor
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
        
        require(['vs/editor/editor.main'], function() {
            window.editor = monaco.editor.create(document.getElementById('monaco-container'), {
                value: [
                    '<!-- Fatahshaheen OS: Header Template -->',
                    '<header class="site-header">',
                    '    <div class="container mx-auto flex justify-between items-center p-4">',
                    '        <div class="logo">',
                    '            <img src="{{ store.logo_url }}" alt="Logo" class="h-8">',
                    '        </div>',
                    '        <nav class="navigation">',
                    '            <ul class="flex gap-6 text-sm font-medium">',
                    '                <li><a href="/">Home</a></li>',
                    '                <li><a href="/shop">Shop</a></li>',
                    '                <li><a href="/contact">Contact</a></li>',
                    '            </ul>',
                    '        </nav>',
                    '    </div>',
                    '</header>'
                ].join('\n'),
                language: 'html',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                fontFamily: 'Fira Code, monospace',
                minimap: { enabled: true },
                lineNumbers: 'on',
                roundedSelection: true,
                scrollBeyondLastLine: false,
                readOnly: false,
                cursorStyle: 'line',
            });
        });

        function saveCode() {
            const code = window.editor.getValue();
            console.log("Saving code to Firebase...", code);
            alert("Code saved successfully to /stores/{storeId}/theme_files/header.html");
        }
    </script>
</body>
</html>
