<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Editor | Fatahshaheen OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#118B50',
                        dark: '#121212',
                        border: '#E5E7EB',
                        panel: '#F3F4F6'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .editor-sidebar { width: 360px; border-right: 1px solid #E5E7EB; }
        .preview-container { background-color: #6B7280; } /* Dark gray background for contrast */
        .preview-window { 
            width: 100%; 
            max-width: 1200px; 
            height: 90%; 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .accordion-content { display: none; }
        .accordion-content.active { display: block; }
        input:focus, select:focus, textarea:focus {
            border-color: #118B50 !important;
            outline: none;
            ring: 2px;
            ring-color: #118B50;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Top Navigation Bar -->
    <header class="h-14 bg-white border-b border-border flex items-center justify-between px-4 z-50">
        <div class="flex items-center gap-4">
            <a href="/dashboard" class="p-2 hover:bg-gray-100 rounded-full transition">
                <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </a>
            <h1 class="font-bold text-gray-800">Theme Customizer</h1>
            <span class="text-xs bg-gray-100 text-gray-500 px-2 py-1 rounded">Live Preview</span>
        </div>

        <div class="flex items-center gap-3">
            <div class="flex bg-gray-100 p-1 rounded-lg mr-4">
                <button class="p-1.5 bg-white shadow-sm rounded-md text-primary">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </button>
                <button class="p-1.5 text-gray-500 hover:text-primary">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                </button>
            </div>
            <button class="px-4 py-1.5 bg-primary text-white text-sm font-bold rounded-lg hover:opacity-90 transition">Publish Changes</button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        
        <!-- Editor Sidebar (Controls) -->
        <aside class="editor-sidebar bg-white flex flex-col overflow-y-auto">
            
            <!-- Section: Hero Banner -->
            <div class="border-b border-border">
                <button onclick="toggleAccordion('hero')" class="w-full p-4 flex items-center justify-between hover:bg-gray-50 transition">
                    <span class="font-semibold text-gray-700 flex items-center gap-2">
                        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        Hero Banner
                    </span>
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="hero" class="accordion-content p-4 bg-panel space-y-4">
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">Main Heading</label>
                        <input type="text" class="w-full mt-1 p-2 border border-border rounded-md text-sm" placeholder="Summer Collection 2024">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">Subtext</label>
                        <textarea class="w-full mt-1 p-2 border border-border rounded-md text-sm h-20" placeholder="Describe your hero section..."></textarea>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">Button Text</label>
                        <input type="text" class="w-full mt-1 p-2 border border-border rounded-md text-sm" placeholder="Shop Now">
                    </div>
                </div>
            </div>

            <!-- Section: Slides -->
            <div class="border-b border-border">
                <button onclick="toggleAccordion('slides')" class="w-full p-4 flex items-center justify-between hover:bg-gray-50 transition">
                    <span class="font-semibold text-gray-700 flex items-center gap-2">
                        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
                        Slideshow
                    </span>
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="slides" class="accordion-content p-4 bg-panel space-y-3">
                    <div class="p-3 border border-dashed border-gray-400 rounded-lg text-center text-xs text-gray-500">
                        + Add New Slide
                    </div>
                </div>
            </div>

            <!-- Section: Products -->
            <div class="border-b border-border">
                <button onclick="toggleAccordion('products')" class="w-full p-4 flex items-center justify-between hover:bg-gray-50 transition">
                    <span class="font-semibold text-gray-700 flex items-center gap-2">
                        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                        Featured Products
                    </span>
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="products" class="accordion-content p-4 bg-panel">
                    <label class="text-xs font-bold text-gray-500 uppercase">Select Collection</label>
                    <select class="w-full mt-1 p-2 border border-border rounded-md text-sm">
                        <option>New Arrivals</option>
                        <option>Best Sellers</option>
                        <option>Summer Sale</option>
                    </select>
                </div>
            </div>

            <!-- Section: Footer -->
            <div class="border-b border-border">
                <button onclick="toggleAccordion('footer')" class="w-full p-4 flex items-center justify-between hover:bg-gray-50 transition">
                    <span class="font-semibold text-gray-700 flex items-center gap-2">
                        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                        Footer Links
                    </span>
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="footer" class="accordion-content p-4 bg-panel">
                    <div class="space-y-2">
                        <div class="flex gap-2"><input type="text" class="flex-1 p-2 border rounded text-sm" value="Privacy Policy"></div>
                        <div class="flex gap-2"><input type="text" class="flex-1 p-2 border rounded text-sm" value="Terms of Service"></div>
                    </div>
                </div>
            </div>

        </aside>

        <!-- Preview Pane -->
        <main class="flex-1 preview-container flex items-center justify-center p-8">
            <div class="preview-window">
                <!-- In production, the src will point to the store's frontend -->
                <iframe src="about:blank" class="w-full h-full border-none bg-white"></iframe>
            </div>
        </main>

    </div>

    <script>
        function toggleAccordion(id) {
            const content = document.getElementById(id);
            const isActive = content.classList.contains('active');
            
            // Close all
            document.querySelectorAll('.accordion-content').forEach(el => el.classList.remove('active'));
            
            // Toggle clicked
            if (!isActive) {
                content.classList.add('active');
            }
        }
    </script>
</body>
</html>
