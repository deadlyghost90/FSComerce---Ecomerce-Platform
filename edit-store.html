<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Builder | Fatahshaheen OS</title>
    
    <!-- GrapesJS Core -->
    <link href="https://unpkg.com/grapesjs/dist/css/grapes.min.css" rel="stylesheet">
    <script src="https://unpkg.com/grapesjs"></script>
    <!-- GrapesJS Basic Blocks Plugin -->
    <script src="https://unpkg.com/grapesjs-blocks-basic"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#118B50',
                        dark: '#121212',
                        border: '#E5E7EB'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Skinning GrapesJS to match Fatahshaheen Emerald Theme */
        .gjs-one-bg { background-color: #ffffff; }
        .gjs-two-bg { background-color: #f9fafb; }
        .gjs-three-bg { background-color: #f3f4f6; }
        .gjs-four-bg { background-color: #118B50; }
        .gjs-four-color { color: #118B50; }
        
        /* Panel Customization */
        .gjs-pn-panels { border-bottom: 1px solid #E5E7EB; }
        .gjs-cv-canvas { background-color: #6B7280; }
        
        /* Block Manager Styling */
        .gjs-block {
            width: 100% !important;
            min-height: 80px !important;
            border-radius: 8px !important;
            border: 1px solid #E5E7EB !important;
            background-color: white !important;
            color: #374151 !important;
            transition: all 0.2s ease;
        }
        .gjs-block:hover {
            border-color: #118B50 !important;
            color: #118B50 !important;
        }

        #gjs { border: none; }

        /* Top Bar Overrides */
        .editor-header {
            height: 60px;
            border-bottom: 1px solid #E5E7EB;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: white;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Custom Editor Header -->
    <header class="editor-header z-50">
        <div class="flex items-center gap-4">
            <a href="/dashboard" class="p-2 hover:bg-gray-100 rounded-full transition text-gray-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </a>
            <div class="flex flex-col">
                <h1 class="font-bold text-gray-800 leading-none text-sm">Visual Store Builder</h1>
                <span class="text-[10px] text-primary font-bold uppercase tracking-wider">Fatahshaheen OS</span>
            </div>
        </div>

        <!-- Device Switcher -->
        <div class="flex bg-gray-100 p-1 rounded-lg">
            <button onclick="setDevice('Desktop')" class="p-2 hover:text-primary transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            </button>
            <button onclick="setDevice('Tablet')" class="p-2 hover:text-primary transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
            </button>
            <button onclick="setDevice('Mobile')" class="p-2 hover:text-primary transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
            </button>
        </div>

        <div class="flex items-center gap-3">
            <button id="save-btn" class="px-6 py-2 bg-primary text-white text-sm font-bold rounded-lg hover:opacity-90 transition shadow-sm shadow-green-900/20">Publish Store</button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden bg-gray-100">
        <!-- GrapesJS Container -->
        <div id="gjs" class="flex-1"></div>
        
        <!-- Right Sidebar for Blocks & Styles -->
        <aside class="w-72 bg-white border-l border-border flex flex-col overflow-y-auto">
            <div class="p-4 border-b border-border bg-gray-50">
                <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Design Elements</h3>
            </div>
            <div id="blocks" class="p-4"></div>
            
            <div class="p-4 border-b border-border bg-gray-50">
                <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Element Settings</h3>
            </div>
            <div id="styles-container" class="p-4"></div>
        </aside>
    </div>

    <script>
        const editor = grapesjs.init({
            container: '#gjs',
            height: '100%',
            width: 'auto',
            storageManager: false, // Will be connected to Python API later
            panels: { defaults: [] }, // We use our custom header
            blockManager: {
                appendTo: '#blocks',
                blocks: [
                    {
                        id: 'section',
                        label: '<b>Section</b>',
                        attributes: { class: 'gjs-block-section' },
                        content: `<section class="py-20 bg-white">
                                    <div class="max-w-7xl mx-auto px-4 text-center">
                                        <h2 class="text-4xl font-bold mb-4">New Collection</h2>
                                        <p class="text-gray-600">Discover the latest trends in fashion.</p>
                                    </div>
                                  </section>`,
                    },
                    {
                        id: 'text',
                        label: 'Text Block',
                        content: '<p class="text-base text-gray-700">Insert your description here...</p>',
                    },
                    {
                        id: 'image',
                        label: 'Image',
                        select: true,
                        content: { type: 'image' },
                        activate: true,
                    },
                    {
                        id: 'product-card',
                        label: '<b>Product Card</b>',
                        content: `<div class="border rounded-lg p-4 bg-white shadow-sm">
                                    <div class="h-48 bg-gray-100 rounded mb-4"></div>
                                    <h4 class="font-bold">Product Name</h4>
                                    <p class="text-primary font-bold">$99.00</p>
                                    <button class="w-full mt-4 bg-black text-white py-2 rounded">Add to Cart</button>
                                  </div>`,
                    }
                ]
            },
            styleManager: {
                appendTo: '#styles-container',
                sectors: [{
                    name: 'Dimension',
                    open: false,
                    buildProps: ['width', 'height', 'min-height', 'padding', 'margin'],
                }, {
                    name: 'Typography',
                    open: false,
                    buildProps: ['font-family', 'font-size', 'font-weight', 'letter-spacing', 'color', 'line-height', 'text-align'],
                }, {
                    name: 'Decorations',
                    open: false,
                    buildProps: ['background-color', 'border-radius', 'border', 'box-shadow'],
                }]
            }
        });

        // Device Switcher Logic
        function setDevice(device) {
            editor.setDevice(device);
        }

        // Save Logic (Placeholder for Python Backend)
        document.getElementById('save-btn').addEventListener('click', () => {
            const html = editor.getHtml();
            const css = editor.getCss();
            console.log('HTML:', html);
            console.log('CSS:', css);
            alert('Storefront data captured. Ready to send to Python Backend.');
        });
    </script>
</body>
</html>
