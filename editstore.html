<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FSCommerce Core Editor</title>
  
  <!-- Latest Stable GrapesJS Links -->
  <link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css">
  <script src="https://unpkg.com/grapesjs"></script>
  <script src="https://unpkg.com/grapesjs-preset-webpage"></script>

  <style>
    body, html { 
      height: 100%; 
      margin: 0; 
      background-color: #0d0d0d; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* FSCommerce OS Branding Overrides */
    .gjs-one-bg { background-color: #181818 !important; } /* Dark Sidebar Background */
    .gjs-two-color { color: #b3b3b3 !important; } /* Secondary Text */
    .gjs-three-bg { background-color: #1db954 !important; color: #000 !important; } /* Primary Green Accents */
    .gjs-four-color, .gjs-four-color-h:hover { color: #1db954 !important; } /* Hover Colors */
    
    /* Clean up the borders */
    .gjs-pn-panel { border-bottom: 1px solid rgba(255,255,255,0.08); }
    .gjs-cv-canvas { background-color: #f4f6f8; }
  </style>
</head>
<body>
  
  <!-- Editor Container -->
  <div id="gjs">
    <div style="padding: 100px 20px; text-align: center; font-family: sans-serif; background: #fff; height: 100vh;">
      <h1 style="font-size: 40px; color: #111;">FSCommerce Visual Builder</h1>
      <p style="font-size: 18px; color: #666; max-width: 600px; margin: 10px auto;">
        Click the <strong>Square Icon</strong> on the top right to open the Blocks Menu.
      </p>
    </div>
  </div>

  <script>
    // Initialize Core Editor
    const editor = grapesjs.init({
      container: '#gjs',
      height: '100vh',
      width: '100%',
      storageManager: false, // Turn off local storage for testing
      plugins: ['gjs-preset-webpage'],
      pluginsOpts: {
        'gjs-preset-webpage': {
          // You can customize the preset here later
        }
      }
    });
  </script>

</body>
</html>
